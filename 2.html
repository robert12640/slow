        사진 찍는 방법: <strong><u>비율</u> 맞추기</strong>
        <p>사진을 잘 찍으려면 비율을 잘 맞추는 게 중요하다.</p>
        <img src="photo.jpg" width="30%">
        <p style="margin-top:50px;">
            빛은 사진의 분위기와 감정을 형성하는 데 매우 중요하다.AI 개요
빛 사진을 멋지게 찍으려면 매직아워(일출/일몰 전후) 활용, 삼각대와 셀프타이머 사용, 프로(수동) 모드로 노출/ISO 조절이 핵심입니다. 야경은 셔터스피드를 낮춰 빛 궤적을 담고, 인물은 역광/측광을 활용해 입체감을 살리세요. 흔들림 없는 선명한 빛 사진을 위해 낮은 ISO와 높은 F값(조리개) 설정이 좋습니다.
